<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - SPT</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        display: flex;
        height: 100vh;
    }

    /* LEFT SIDE */
    .left {
        width: 50%;
        padding: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: white;
    }

    .logo {
        font-weight: bold;
        margin-bottom: 40px;
        color: #1a3a8f;
    }

    h1 {
        margin-bottom: 10px;
    }

    .subtitle {
        color: gray;
        margin-bottom: 30px;
        font-size: 14px;
    }

    .input-group {
        margin-bottom: 15px;
    }

    .input-group input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    .options {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin-bottom: 20px;
    }

    .btn {
        background: #2d5fde;
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn:hover {
        background: #1a3a8f;
    }

    .company {
        margin-top: 10px;
        font-size: 12px;
        color: #888;
    }

    /* RIGHT SIDE */
    .right {
    width: 50%;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background-size: cover;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

.bg-img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(26, 58, 143, 0.6);
}

.content {
    position: relative;
    z-index: 2;
    color: white;
    text-align: center;
}

.right::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(26, 58, 143, 0.7);
}

.right {
        width: 50%;
        background: linear-gradient(135deg, #1a3a8f, #2d5fde);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
        padding: 40px;
    }
    .right h2 {
        font-size: 28px;
        margin-bottom: 10px;
    }

    .right p {
        opacity: 0.8;
    }

</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
    <div class="logo">Sanoh Indonesia</div>

    <h1>Welcome back</h1>
    <p class="subtitle">Please enter your details</p>

    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <div class="options">
        <span>Remember me</span>
        <span style="color:#2d5fde; cursor:pointer;">Forgot password</span>
    </div>

    <button class="btn" onclick="login()">Sign in</button>

    <p class="company">Supplier Performance Tracker<br>PT Sanoh Indonesia</p>

    <p id="error" style="color:red; font-size:13px;"></p>
</div>

<!-- RIGHT -->
<div class="right">
    <img src="sanohcomp.jpg" class="bg-img">

    <div class="overlay"></div>
    <div class="content">
        <h2>SPT System</h2>
        <p>Monitor supplier performance efficiently and professionally</p>
    </div>
</div>

<script>
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "admin" && pass === "123") {
        localStorage.setItem("isLogin", "true");
        window.location.href = "dashboard.html";
    } else {
        document.getElementById("error").innerText = "Login gagal!";
    }
}
</script>

</body>
</html>
